{% extends "base.html" %}
{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; font-family: 'Segoe UI', sans-serif;">
    <div style="background: white; padding: 50px; border-radius: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); max-width: 500px;">
        <div style="font-size: 5rem; margin-bottom: 20px;">🚀</div>
        <h1 style="color: #2D3748; font-size: 2.5rem; margin-bottom: 10px;">Level Up!</h1>
        <p style="color: #718096; font-size: 1.2rem; margin-bottom: 30px;">
            Hervorragend! Du hast Level A gemeistert und bist nun in <strong>Level B</strong>.
        </p>
        
        <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 40px;">
            <div style="background: #EDF2F7; padding: 20px; border-radius: 20px; min-width: 100px;">
                <span style="display: block; font-size: 0.8rem; color: #A0AEC0; text-transform: uppercase;">Von</span>
                <span style="font-size: 1.5rem; font-weight: bold; color: #667EEA;">A</span>
            </div>
            <div style="align-self: center; font-size: 1.5rem; color: #CBD5E0;">➔</div>
            <div style="background: #EBF4FF; padding: 20px; border-radius: 20px; min-width: 100px; border: 2px solid #667EEA;">
                <span style="display: block; font-size: 0.8rem; color: #667EEA; text-transform: uppercase;">Zu</span>
                <span style="font-size: 1.5rem; font-weight: bold; color: #667EEA;">B</span>
            </div>
        </div>

        <a href="{{ url_for('dashboard') }}" style="display: inline-block; background: linear-gradient(135deg, #667EEA 0%, #764BA2 100%); color: white; padding: 15px 40px; border-radius: 15px; text-decoration: none; font-weight: bold; transition: transform 0.2s;">
            Weiter zum Dashboard
        </a>
    </div>
</div>
{% endblock %}
