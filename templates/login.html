{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Willkommen zurück</h2>
    <p class="auth-sub">Noch kein Konto? <a href="{{ url_for('register') }}">Registrieren</a></p>

    <form method="POST">
      <div class="form-group">
        <label>E-Mail</label>
        <input type="email" name="email" required autofocus placeholder="du@beispiel.ch">
      </div>
      <div class="form-group">
        <label>Passwort</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <div class="form-check">
        <input type="checkbox" name="remember" id="remember">
        <label for="remember">Angemeldet bleiben</label>
      </div>
      <button type="submit" class="btn-primary btn-full">Einloggen</button>
    </form>
  </div>
</div>
{% endblock %}
